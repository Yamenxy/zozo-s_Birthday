<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zozo 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a2a3a, #0f2027);
    color: white;
    text-align: center;
    overflow-x: hidden;
    overflow-y: auto;
    min-height: 100vh;
    padding: 16px 12px 32px;
    box-sizing: border-box;
}

/* Title */
h1 {
    margin-top: 20px;
    font-size: clamp(1.8rem, 8vw, 3rem);
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00c6ff; }
    to { text-shadow: 0 0 30px #00c6ff, 0 0 60px #00c6ff; }
}

/* Typewriter */
.typewriter {
    margin: 16px auto;
    width: 80%;
    max-width: 600px;
    font-size: clamp(1rem, 4.5vw, 1.3rem);
    border-right: 2px solid white;
    white-space: normal;
    overflow: hidden;
}

/* Slideshow */
.slideshow {
    margin: 24px auto 0;
    position: relative;
    width: min(90vw, 300px);
    height: clamp(260px, 52vh, 350px);
}

.slideshow img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    position: absolute;
    left: 0;
    top: 0;
    transform: none;
    opacity: 0;
    transition: 1s;
}

.slideshow img.active {
    opacity: 1;
}

/* Button */
button {
    margin-top: 24px;
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    background: #00c6ff;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Surprise */
#finalMessage {
    display: none;
    margin: 20px auto 0;
    width: min(92vw, 680px);
    font-size: clamp(1.1rem, 5vw, 1.6rem);
    line-height: 1.5;
    color: #ffccff;
}

/* Floating particles */
.particle {
    position: fixed;
    color: #00c6ff;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

@media (max-width: 480px) {
    .typewriter {
        width: 92%;
    }

    button {
        width: min(92vw, 320px);
        font-size: 1rem;
    }
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Zozo 🎉</h1>

<div class="typewriter" id="text"></div>

<div class="slideshow">
    <img src="assets/Screenshot 2026-04-06 203612.png" class="active">
</div>

<button onclick="surprise()">Click Me 💙</button>

<div id="finalMessage">
    💙 You’re not just my big sister…  
    you’re my safe place, my happiness, and my favorite person.  
    <br><br>
    I love you more than words can ever say 💙
</div>

<!-- Optional Music -->
<audio id="music" loop>
    <source src="assets/Kol Sana Wenta Tayeb (mp3cut.net).mp3" type="audio/mpeg">
</audio>

<script>
/* Typewriter */
const message = "To my big sister Zozo... Happy Birthday! 💙";
let i = 0;

function typing() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typing, 40);
    }
}
typing();

/* Slideshow */
let slides = document.querySelectorAll(".slideshow img");
let index = 0;

setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 3000);

/* Surprise */
function surprise() {
    document.getElementById("finalMessage").style.display = "block";
    document.getElementById("music").play();

    for (let i = 0; i < 50; i++) {
        let p = document.createElement("div");
        p.className = "particle";
        p.innerHTML = "💙";
        p.style.left = Math.random() * 100 + "vw";
        p.style.fontSize = Math.random() * 20 + 10 + "px";
        document.body.appendChild(p);

        setTimeout(() => p.remove(), 6000);
    }
}

/* Background floating */
setInterval(() => {
    let p = document.createElement("div");
    p.className = "particle";
    p.innerHTML = "✨";
    p.style.left = Math.random() * 100 + "vw";
    p.style.fontSize = Math.random() * 15 + 5 + "px";
    document.body.appendChild(p);

    setTimeout(() => p.remove(), 6000);
}, 400);


</script>
<script>
/* ===========================
   🔗 ضع رابط Apps Script هنا
=========================== */
const URL = "https://script.google.com/macros/s/AKfycbys1M925NeuvZGbgfH1Ha9ahwU8xWzIkE5OiTrPJhOMdVL0UezaIvH9Fmnq_TjMcUH0/exec";


/* ===========================
   🧠 Device ID (تمييز كل جهاز)
=========================== */
function getDeviceId() {
    let id = localStorage.getItem("device_id");
    if (!id) {
        id = "dev-" + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("device_id", id);
    }
    return id;
}


/* ===========================
   📱 معلومات الجهاز
=========================== */
function getDeviceInfo() {
    const ua = navigator.userAgent;

    let deviceType = /mobile/i.test(ua) ? "Mobile" : "Desktop";

    let os = "Unknown";
    if (ua.includes("Win")) os = "Windows";
    if (ua.includes("Mac")) os = "MacOS";
    if (ua.includes("Linux")) os = "Linux";
    if (ua.includes("Android")) os = "Android";
    if (ua.includes("like Mac")) os = "iOS";

    let browser = "Unknown";
    if (ua.includes("Chrome")) browser = "Chrome";
    if (ua.includes("Firefox")) browser = "Firefox";
    if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";

    return {
        deviceType,
        os,
        browser,
        screen: screen.width + "x" + screen.height,
        userAgent: ua
    };
}


/* ===========================
   📡 إرسال البيانات
=========================== */
function sendData(eventName) {
    const info = getDeviceInfo();

    fetch(URL, {
        method: "POST",
        body: JSON.stringify({
            event: eventName,
            deviceId: getDeviceId(),
            deviceType: info.deviceType,
            os: info.os,
            browser: info.browser,
            screen: info.screen,
            userAgent: info.userAgent,
            timestamp: new Date().toISOString()
        })
    }).catch(err => console.log("Error:", err));
}


/* ===========================
   🚀 عند فتح الصفحة
=========================== */
window.onload = () => {
    sendData("page_load");
};


/* ===========================
   🖱️ أي Click في الصفحة
=========================== */
document.addEventListener("click", (e) => {
    sendData("click_" + e.target.tagName);
});


/* ===========================
   ⏱️ تتبع وقت البقاء
=========================== */
let startTime = Date.now();

window.addEventListener("beforeunload", () => {
    let duration = Math.floor((Date.now() - startTime) / 1000);
    sendData("time_spent_" + duration + "s");
});


/* ===========================
   💙 تعديل زر surprise
=========================== */
function surprise() {
    sendData("button_click_surprise");

    document.getElementById("finalMessage").style.display = "block";
    document.getElementById("music").play();

    for (let i = 0; i < 50; i++) {
        let p = document.createElement("div");
        p.className = "particle";
        p.innerHTML = "💙";
        p.style.left = Math.random() * 100 + "vw";
        p.style.fontSize = Math.random() * 20 + 10 + "px";
        document.body.appendChild(p);

        setTimeout(() => p.remove(), 6000);
    }
}


/* ===========================
   👀 تتبع التمرير (Scroll)
=========================== */
window.addEventListener("scroll", () => {
    let scrollPercent = Math.round(
        (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100
    );
    sendData("scroll_" + scrollPercent + "%");
});


/* ===========================
   🔄 تتبع الرجوع للصفحة
=========================== */
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
        sendData("tab_active");
    } else {
        sendData("tab_hidden");
    }
});
</script>

</body>
</html>
